<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANVA Balance Tetris</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#101010;
      color:#fff;
      text-align:center;
    }
    h1{ margin:16px 0 8px; }
    p{ margin:8px 16px; }
    #controls, #modeBar{
      margin:10px 0;
    }
    button, select{
      padding:10px 14px;
      font-size:16px;
      margin:5px;
      border:none;
      border-radius:10px;
    }
    #wrap{
      width:360px;
      margin:16px auto;
      background:#1a1a1a;
      border:2px solid #444;
      border-radius:12px;
      padding:14px;
    }
    canvas{
      background:#000;
      border:2px solid #888;
      border-radius:8px;
      display:block;
      margin:0 auto;
    }
    #status, #live, #scoreLine{
      margin-top:10px;
      font-size:16px;
    }
    #report{
      width:90%;
      max-width:760px;
      margin:24px auto;
      background:#1a1a1a;
      border:1px solid #444;
      border-radius:10px;
      padding:16px;
      text-align:left;
      display:none;
      white-space:pre-line;
    }
    .small{
      font-size:14px;
      color:#ccc;
    }
  </style>
</head>
<body>
  <h1>ANVA Balance Tetris</h1>
  <p>Lean left or right to move the falling block. Slight forward lean can speed the drop.</p>

  <div id="modeBar">
    <label for="laneMode">Mode:</label>
    <select id="laneMode">
      <option value="2">2 Lanes</option>
      <option value="3" selected>3 Lanes</option>
    </select>
  </div>

  <div id="controls">
    <button id="motionBtn">Enable Motion</button>
    <button id="calibrateBtn">Calibrate Neutral</button>
    <button id="startBtn">Start Game</button>
    <button id="finishBtn">Finish Test</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="wrap">
    <canvas id="gameCanvas" width="240" height="400"></canvas>
    <div id="status">Status: waiting</div>
    <div id="scoreLine">Score: 0 | Placed: 0 | Missed: 0</div>
    <div id="live">Pitch: 0 | Roll: 0 | Lane: -</div>
    <div class="small">Keyboard fallback: Left / Right arrows to move, Down arrow for faster drop.</div>
  </div>

  <div id="report"></div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const motionBtn = document.getElementById("motionBtn");
    const calibrateBtn = document.getElementById("calibrateBtn");
    const startBtn = document.getElementById("startBtn");
    const finishBtn = document.getElementById("finishBtn");
    const resetBtn = document.getElementById("resetBtn");
    const laneModeEl = document.getElementById("laneMode");

    const statusEl = document.getElementById("status");
    const scoreLineEl = document.getElementById("scoreLine");
    const liveEl = document.getElementById("live");
    const reportEl = document.getElementById("report");

    let neutralRoll = 0;
    let neutralPitch = 0;
    let currentRoll = 0;
    let currentPitch = 0;

    let laneCount = 3;
    let laneWidth = canvas.width / laneCount;
    const rowHeight = 28;
    const rows = Math.floor(canvas.height / rowHeight);

    let board = [];
    let currentBlock = null;

    let gameRunning = false;
    let gameOver = false;
    let animationId = null;
    let lastDropTime = 0;
    let dropInterval = 900;
    let lastLaneChangeTime = 0;
    let moveCooldown = 220;

    let score = 0;
    let placed = 0;
    let missed = 0;
    let clearedRows = 0;
    let spawnCount = 0;
    let leftMoves = 0;
    let rightMoves = 0;
    let fastDrops = 0;
    let moveReactionSamples = [];
    let spawnTime = 0;
    let laneHistory = [];
    let reportGenerated = false;

    function initBoard() {
      laneCount = parseInt(laneModeEl.value, 10);
      laneWidth = canvas.width / laneCount;
      board = [];
      for (let r = 0; r < rows; r++) {
        board.push(new Array(laneCount).fill(0));
      }
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = "#333";
      for (let c = 0; c <= laneCount; c++) {
        ctx.beginPath();
        ctx.moveTo(c * laneWidth, 0);
        ctx.lineTo(c * laneWidth, canvas.height);
        ctx.stroke();
      }
      for (let r = 0; r <= rows; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * rowHeight);
        ctx.lineTo(canvas.width, r * rowHeight);
        ctx.stroke();
      }

      // Settled blocks
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < laneCount; c++) {
          if (board[r][c]) {
            ctx.fillStyle = "#4fc3f7";
            ctx.fillRect(c * laneWidth + 2, r * rowHeight + 2, laneWidth - 4, rowHeight - 4);
          }
        }
      }

      // Falling block
      if (currentBlock) {
        ctx.fillStyle = "#ff5252";
        ctx.fillRect(
          currentBlock.lane * laneWidth + 2,
          currentBlock.y + 2,
          laneWidth - 4,
          rowHeight - 4
        );
      }
    }

    function updateStatus() {
      scoreLineEl.textContent = `Score: ${score} | Placed: ${placed} | Missed: ${missed} | Rows: ${clearedRows}`;
      liveEl.textContent = `Pitch: ${currentPitch.toFixed(1)} | Roll: ${currentRoll.toFixed(1)} | Lane: ${currentBlock ? currentBlock.lane + 1 : "-"}`;
    }

    function spawnBlock() {
      const startLane = Math.floor(laneCount / 2);
      currentBlock = {
        lane: startLane,
        y: 0
      };
      spawnTime = performance.now();
      spawnCount++;
      laneHistory.push(startLane + 1);

      if (board[0][startLane] === 1) {
        gameOver = true;
        gameRunning = false;
        statusEl.textContent = "Status: game over";
        generateReport();
      }
    }

    function lockBlock() {
      const row = Math.floor(currentBlock.y / rowHeight);
      if (row >= 0 && row < rows) {
        board[row][currentBlock.lane] = 1;
        placed++;
        score += 10;
      } else {
        missed++;
      }

      clearFullRows();
      spawnBlock();
    }

    function clearFullRows() {
      let rowsClearedThisTurn = 0;
      for (let r = rows - 1; r >= 0; r--) {
        const full = board[r].every(cell => cell === 1);
        if (full) {
          board.splice(r, 1);
          board.unshift(new Array(laneCount).fill(0));
          rowsClearedThisTurn++;
          r++;
        }
      }
      if (rowsClearedThisTurn > 0) {
        clearedRows += rowsClearedThisTurn;
        score += rowsClearedThisTurn * 50;
      }
    }

    function canMoveToLane(newLane) {
      return newLane >= 0 && newLane < laneCount;
    }

    function moveLane(dir) {
      if (!currentBlock || !gameRunning) return;

      const now = performance.now();
      if (now - lastLaneChangeTime < moveCooldown) return;

      const newLane = currentBlock.lane + dir;
      if (canMoveToLane(newLane)) {
        currentBlock.lane = newLane;
        lastLaneChangeTime = now;

        const reaction = (now - spawnTime) / 1000;
        moveReactionSamples.push(reaction);

        if (dir < 0) leftMoves++;
        if (dir > 0) rightMoves++;
      }
    }

    function speedDrop() {
      if (!currentBlock || !gameRunning) return;
      currentBlock.y += rowHeight * 0.35;
      fastDrops++;
    }

    function updateBlock(now) {
      if (!currentBlock || !gameRunning) return;

      const tiltRoll = currentRoll - neutralRoll;
      const tiltPitch = currentPitch - neutralPitch;

      if (tiltRoll < -7) {
        moveLane(-1);
      } else if (tiltRoll > 7) {
        moveLane(1);
      }

      let interval = dropInterval;
      if (tiltPitch > 8) {
        interval = 250;
      }

      if (now - lastDropTime >= interval) {
        currentBlock.y += rowHeight;
        lastDropTime = now;
      }

      const row = Math.floor(currentBlock.y / rowHeight);

      if (row >= rows) {
        currentBlock.y = (rows - 1) * rowHeight;
        lockBlock();
        return;
      }

      if (row >= 0 && row < rows && board[row][currentBlock.lane] === 1) {
        currentBlock.y = (row - 1) * rowHeight;
        if (currentBlock.y < 0) {
          gameOver = true;
          gameRunning = false;
          statusEl.textContent = "Status: game over";
          generateReport();
        } else {
          lockBlock();
        }
      }
    }

    function average(arr) {
      if (!arr.length) return 0;
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function generateReport() {
      if (reportGenerated) return;
      reportGenerated = true;

      const avgReaction = average(moveReactionSamples);
      const totalMoves = leftMoves + rightMoves;
      const lateralSymmetry = totalMoves > 0
        ? Math.abs(leftMoves - rightMoves) / totalMoves
        : 0;

      let controlQuality = "Good";
      if (avgReaction === 0 || placed < 4) controlQuality = "Limited";
      else if (avgReaction > 1.4) controlQuality = "Fair";
      else if (avgReaction > 0.9) controlQuality = "Good";
      else controlQuality = "Very good";

      let scoreOutOf100 = 50;
      scoreOutOf100 += Math.min(20, placed * 2);
      scoreOutOf100 += Math.min(15, clearedRows * 5);
      scoreOutOf100 += Math.max(0, 15 - missed * 4);
      if (avgReaction > 0) {
        scoreOutOf100 += Math.max(0, Math.min(10, 10 - ((avgReaction - 0.8) * 7)));
      }
      scoreOutOf100 += Math.max(0, Math.min(10, 10 - lateralSymmetry * 20));
      scoreOutOf100 = Math.max(0, Math.min(100, Math.round(scoreOutOf100)));

      let interpretation = "Moderate balance-cognitive challenge";
      if (scoreOutOf100 >= 85) interpretation = "Good balance-control performance";
      else if (scoreOutOf100 >= 70) interpretation = "Mild challenge";
      else if (scoreOutOf100 >= 55) interpretation = "Moderate challenge";
      else interpretation = "High challenge / start simpler";

      const reportText = `
ANVA BALANCE TETRIS REPORT
Mode: ${laneCount} lanes

Blocks Spawned: ${spawnCount}
Blocks Placed: ${placed}
Blocks Missed: ${missed}
Rows Cleared: ${clearedRows}

Left Moves: ${leftMoves}
Right Moves: ${rightMoves}
Fast Drops: ${fastDrops}

Average Move Reaction Time: ${avgReaction ? avgReaction.toFixed(2) : "-"} sec
Lateral Symmetry Index: ${lateralSymmetry.toFixed(2)}

Game Score: ${score}
Clinical Score: ${scoreOutOf100}/100
Control Quality: ${controlQuality}
Interpretation: ${interpretation}

Clinical Notes
- 2-lane mode is better for early balance training.
- 3-lane mode adds more motor planning and directional precision.
- Slower reaction time may reflect delayed weight shift or cognitive load.
- Large left-right imbalance may suggest asymmetrical control or preference.

Recommendation
${laneCount === 2
  ? "Use 2-lane mode for beginners, then progress to 3 lanes."
  : "If this felt manageable, keep 3 lanes. If accuracy was low, train in 2-lane mode first."}
      `.trim();

      reportEl.textContent = reportText;
      reportEl.style.display = "block";
    }

    function gameLoop(now) {
      updateBlock(now);
      drawBoard();
      updateStatus();

      if (gameRunning) {
        animationId = requestAnimationFrame(gameLoop);
      }
    }

    function startGame() {
      reportGenerated = false;
      reportEl.style.display = "none";
      reportEl.textContent = "";

      score = 0;
      placed = 0;
      missed = 0;
      clearedRows = 0;
      spawnCount = 0;
      leftMoves = 0;
      rightMoves = 0;
      fastDrops = 0;
      moveReactionSamples = [];
      laneHistory = [];

      initBoard();
      gameOver = false;
      gameRunning = true;
      lastDropTime = performance.now();

      spawnBlock();
      statusEl.textContent = "Status: game running";

      if (animationId) cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(gameLoop);
    }

    function finishGame() {
      gameRunning = false;
      statusEl.textContent = "Status: test finished";
      if (animationId) cancelAnimationFrame(animationId);
      drawBoard();
      generateReport();
    }

    function resetGame() {
      gameRunning = false;
      gameOver = false;
      if (animationId) cancelAnimationFrame(animationId);

      initBoard();
      currentBlock = null;
      score = 0;
      placed = 0;
      missed = 0;
      clearedRows = 0;
      spawnCount = 0;
      leftMoves = 0;
      rightMoves = 0;
      fastDrops = 0;
      moveReactionSamples = [];
      laneHistory = [];
      reportGenerated = false;

      statusEl.textContent = "Status: reset";
      scoreLineEl.textContent = "Score: 0 | Placed: 0 | Missed: 0";
      liveEl.textContent = "Pitch: 0 | Roll: 0 | Lane: -";
      reportEl.style.display = "none";
      reportEl.textContent = "";

      drawBoard();
    }

    function handleOrientation(event) {
      if (typeof event.gamma === "number") currentRoll = event.gamma;
      if (typeof event.beta === "number") currentPitch = event.beta;
    }

    motionBtn.addEventListener("click", async () => {
      try {
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const response = await DeviceOrientationEvent.requestPermission();
          if (response === "granted") {
            window.addEventListener("deviceorientation", handleOrientation);
            statusEl.textContent = "Status: motion enabled";
          } else {
            statusEl.textContent = "Status: motion permission denied";
          }
        } else {
          window.addEventListener("deviceorientation", handleOrientation);
          statusEl.textContent = "Status: motion enabled";
        }
      } catch (err) {
        statusEl.textContent = "Status: motion error";
        console.error(err);
      }
    });

    calibrateBtn.addEventListener("click", () => {
      neutralRoll = currentRoll;
      neutralPitch = currentPitch;
      statusEl.textContent = `Status: calibrated | roll ${neutralRoll.toFixed(1)} | pitch ${neutralPitch.toFixed(1)}`;
    });

    startBtn.addEventListener("click", startGame);
    finishBtn.addEventListener("click", finishGame);
    resetBtn.addEventListener("click", resetGame);

    laneModeEl.addEventListener("change", resetGame);

    window.addEventListener("keydown", (e) => {
      if (!gameRunning) return;
      if (e.key === "ArrowLeft") moveLane(-1);
      if (e.key === "ArrowRight") moveLane(1);
      if (e.key === "ArrowDown") speedDrop();
    });

    initBoard();
    drawBoard();
  </script>
</body>
</html>
