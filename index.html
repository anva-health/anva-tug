<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ANVA TUG 2.0</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
    }

    #viewport {
      position: relative;
      display: inline-block;
      width: 480px;
      height: 640px;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 480px;
      height: 640px;
    }

    #tapeLine {
      position: absolute;
      left: 0;
      width: 100%;
      height: 6px;
      background: blue;
      top: 55%;
      z-index: 5;
      cursor: pointer;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
    }

  </style>
</head>

<body>

<h2>ANVA TUG 2.0</h2>

<div id="viewport">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="tapeLine"></div>
</div>

<br>
<button onclick="startCamera()">Start Camera</button>
<button onclick="startRecording()">Record TUG</button>

<script>

let detector;
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let recording = false;
let keypointsLog = [];
let startTime = null;
let turnDetected = false;
let turnTime = null;

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" }
  });
  video.srcObject = stream;

  const model = poseDetection.SupportedModels.MoveNet;
  detector = await poseDetection.createDetector(model);

  detectPose();
}

async function detectPose() {
  if (!detector) return;

  const poses = await detector.estimatePoses(video);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (poses.length > 0) {
    const pose = poses[0];

    drawSkeleton(pose);

    if (recording) {
      processPose(pose);
    }
  }

  requestAnimationFrame(detectPose);
}

function drawSkeleton(pose) {
  ctx.fillStyle = "lime";

  pose.keypoints.forEach(k => {
    if (k.score > 0.4) {
      ctx.beginPath();
      ctx.arc(k.x, k.y, 5, 0, 2 * Math.PI);
      ctx.fill();
    }
  });
}

function startRecording() {
  recording = true;
  keypointsLog = [];
  startTime = performance.now();
  turnDetected = false;
  turnTime = null;
}

function processPose(pose) {

  const timestamp = performance.now() - startTime;

  const leftAnkle = pose.keypoints.find(k => k.name === "left_ankle");
  const rightAnkle = pose.keypoints.find(k => k.name === "right_ankle");

  const tape = document.getElementById("tapeLine");
  const tapeRect = tape.getBoundingClientRect();
  const videoRect = video.getBoundingClientRect();

  const tapeY = tapeRect.top - videoRect.top;

  if (!turnDetected && leftAnkle && rightAnkle) {

    if (
      (leftAnkle.y < tapeY && rightAnkle.y < tapeY)
    ) {
      turnDetected = true;
      turnTime = timestamp;
      console.log("TURN DETECTED at:", turnTime);
    }
  }

  keypointsLog.push({
    time: timestamp,
    keypoints: pose.keypoints
  });
}

window.addEventListener("resize", () => {
  canvas.width = video.clientWidth;
  canvas.height = video.clientHeight;
});

</script>

</body>
</html>
