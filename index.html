<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ANVA Balance Trainer</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f6f7;
}

button{
padding:12px 18px;
margin:6px;
font-size:16px;
border-radius:10px;
border:none;
}

#arena{
width:320px;
height:320px;
background:white;
border:3px solid black;
margin:auto;
position:relative;
}

#dot{
width:18px;
height:18px;
background:red;
border-radius:50%;
position:absolute;
left:150px;
top:150px;
}

#circle{
width:200px;
height:200px;
border:4px solid black;
border-radius:50%;
position:absolute;
left:60px;
top:60px;
}

.target{
width:26px;
height:26px;
background:blue;
border-radius:50%;
position:absolute;
}

.path{
position:absolute;
background:#ddd;
}

</style>
</head>

<body>

<h1>ANVA Balance Trainer</h1>

<button onclick="enableMotion()">Enable Motion</button>

<br><br>

<button onclick="startStability()">1 Stability Hold</button>
<button onclick="startTargets()">2 Direction Targets</button>
<button onclick="startPath()">3 Path Follow</button>

<h3 id="score">Score: 0</h3>

<div id="arena">

<div id="circle"></div>
<div id="dot"></div>

</div>

<script>

let tiltX=0
let tiltY=0
let game="none"
let score=0

let dot=document.getElementById("dot")

function enableMotion(){

if(typeof DeviceMotionEvent.requestPermission==="function"){

DeviceMotionEvent.requestPermission().then(permission=>{

if(permission==="granted"){
window.addEventListener("devicemotion",handleMotion)
}

})

}else{

window.addEventListener("devicemotion",handleMotion)

}

}

function handleMotion(e){

tiltX=e.accelerationIncludingGravity.x
tiltY=e.accelerationIncludingGravity.y

update()

}

function update(){

let x=150 + tiltX*12
let y=150 + tiltY*12

x=Math.max(0,Math.min(300,x))
y=Math.max(0,Math.min(300,y))

dot.style.left=x+"px"
dot.style.top=y+"px"

if(game==="stability"){

let dx=x-150
let dy=y-150

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<90){
score++
document.getElementById("score").innerText="Score: "+score
}

}

if(game==="targets"){
checkTargets(x,y)
}

if(game==="path"){
checkPath(x,y)
}

}

function startStability(){

game="stability"
score=0

document.getElementById("arena").innerHTML='\
<div id="circle"></div>\
<div id="dot"></div>'

dot=document.getElementById("dot")

}

let targetX
let targetY

function startTargets(){

game="targets"
score=0

document.getElementById("arena").innerHTML='<div id="dot"></div>'

dot=document.getElementById("dot")

spawnTarget()

}

function spawnTarget(){

targetX=Math.random()*260
targetY=Math.random()*260

let t=document.createElement("div")
t.className="target"
t.style.left=targetX+"px"
t.style.top=targetY+"px"

document.getElementById("arena").appendChild(t)

}

function checkTargets(x,y){

let dx=x-targetX
let dy=y-targetY

if(Math.sqrt(dx*dx+dy*dy)<25){

score+=10
document.getElementById("score").innerText="Score: "+score

document.querySelector(".target").remove()

spawnTarget()

}

}

function startPath(){

game="path"
score=0

document.getElementById("arena").innerHTML='\
<div id="dot"></div>\
<div class="path" style="left:0;top:140;width:320px;height:40px"></div>'

dot=document.getElementById("dot")

}

function checkPath(x,y){

if(y>140 && y<180){
score++
}else{
score--
}

document.getElementById("score").innerText="Score: "+score

}

</script>

</body>
</html>
