<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANVA Sway Steps v1</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin: 16px 0 8px;
      font-size: 28px;
    }

    p {
      margin: 8px 16px;
    }

    #controls, #comfortControls {
      margin: 12px 0;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #comfortControls {
      display: none;
    }

    #gameWrap {
      width: 420px;
      margin: 16px auto;
      position: relative;
    }

    #gameArea {
      width: 400px;
      height: 400px;
      margin: auto;
      background: #1c1c1c;
      border: 3px solid #fff;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
    }

    #centerRing {
      width: 44px;
      height: 44px;
      border: 2px dashed #5cc8ff;
      border-radius: 50%;
      position: absolute;
      left: 178px;
      top: 178px;
      box-sizing: border-box;
    }

    .target {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #555;
      position: absolute;
      transform: translate(-50%, -50%);
      border: 2px solid #999;
    }

    .target.active {
      background: gold;
      border-color: #fff;
      box-shadow: 0 0 12px gold;
    }

    #dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: red;
      position: absolute;
      left: 191px;
      top: 191px;
    }

    #status, #liveData, #roundInfo, #timerInfo {
      font-size: 16px;
      margin-top: 8px;
    }

    #report {
      width: 90%;
      max-width: 760px;
      margin: 24px auto;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 16px;
      text-align: left;
      display: none;
      white-space: pre-line;
    }

    .small {
      font-size: 14px;
      color: #ccc;
    }

    #pathCanvas {
      position: absolute;
      left: 10px;
      top: 10px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>ANVA Sway Steps v1</h1>
  <p>Tiny left-right ankle sway only. Move the dot between the two nearby targets.</p>

  <div id="controls">
    <button id="motionBtn">Enable Motion</button>
    <button id="calibrateBtn">Calibrate Neutral</button>
    <button id="startBtn">Start Test</button>
    <button id="finishBtn">Finish Test</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="comfortControls">
    <button id="comfortableBtn">Comfortable</button>
    <button id="sameBtn">Keep Same</button>
    <button id="tooMuchBtn">Too Much</button>
  </div>

  <p id="status">Status: waiting</p>
  <p id="roundInfo">Round: -</p>
  <p id="timerInfo">Time: -</p>
  <p id="liveData">Roll: 0 | X: 200</p>
  <p class="small">Best on iPhone Safari. Phone in front pocket. Stand safely near support.</p>

  <div id="gameWrap">
    <div id="gameArea">
      <canvas id="pathCanvas" width="400" height="400"></canvas>
      <div id="centerRing"></div>
      <div id="leftTarget" class="target"></div>
      <div id="rightTarget" class="target"></div>
      <div id="dot"></div>
    </div>
  </div>

  <div id="report"></div>

  <script>
    const dot = document.getElementById("dot");
    const statusEl = document.getElementById("status");
    const roundInfoEl = document.getElementById("roundInfo");
    const timerInfoEl = document.getElementById("timerInfo");
    const liveDataEl = document.getElementById("liveData");
    const reportEl = document.getElementById("report");

    const motionBtn = document.getElementById("motionBtn");
    const calibrateBtn = document.getElementById("calibrateBtn");
    const startBtn = document.getElementById("startBtn");
    const finishBtn = document.getElementById("finishBtn");
    const resetBtn = document.getElementById("resetBtn");

    const comfortControls = document.getElementById("comfortControls");
    const comfortableBtn = document.getElementById("comfortableBtn");
    const sameBtn = document.getElementById("sameBtn");
    const tooMuchBtn = document.getElementById("tooMuchBtn");

    const leftTargetEl = document.getElementById("leftTarget");
    const rightTargetEl = document.getElementById("rightTarget");

    const canvas = document.getElementById("pathCanvas");
    const ctx = canvas.getContext("2d");

    const centerX = 200;
    const centerY = 200;
    const targetTolerance = 18;

    let neutralRoll = 0;
    let currentRoll = 0;

    let dotX = centerX;
    let dotY = centerY;

    let scale = 1.15; // small movement only
    let currentSpacing = 14; // tiny initial spacing
    const spacingStep = 6;
    const minSpacing = 10;
    const maxRounds = 5;
    const roundDurationMs = 10000;

    let roundNumber = 0;
    let phase = "idle"; // idle, running, pausedForComfort, done
    let activeTarget = "right";
    let roundStartTime = null;
    let currentRoundTimer = null;

    let pathPoints = [];

    let roundStats = null;
    let allRounds = [];

    function distance(x1, y1, x2, y2) {
      return Math.hypot(x2 - x1, y2 - y1);
    }

    function setTargets(spacing) {
      leftTargetEl.style.left = (centerX - spacing) + "px";
      leftTargetEl.style.top = centerY + "px";

      rightTargetEl.style.left = (centerX + spacing) + "px";
      rightTargetEl.style.top = centerY + "px";
    }

    function activateTarget(side) {
      leftTargetEl.classList.remove("active");
      rightTargetEl.classList.remove("active");
      if (side === "left") leftTargetEl.classList.add("active");
      if (side === "right") rightTargetEl.classList.add("active");
      activeTarget = side;
    }

    function updateDotPosition() {
      const dx = (currentRoll - neutralRoll) * scale;
      dotX = centerX + dx;
      dotY = centerY;

      dotX = Math.max(20, Math.min(362, dotX));

      dot.style.left = dotX + "px";
      dot.style.top = dotY + "px";

      liveDataEl.textContent = `Roll: ${currentRoll.toFixed(1)} | X: ${dotX.toFixed(0)} | Spacing: ${currentSpacing}px`;
    }

    function addPathPoint() {
      pathPoints.push({ x: dotX + 9, y: dotY + 9 });
      if (pathPoints.length > 600) pathPoints.shift();
    }

    function drawPath() {
      ctx.clearRect(0, 0, 400, 400);
      if (pathPoints.length < 2) return;

      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "#55d6ff";
      ctx.moveTo(pathPoints[0].x, pathPoints[0].y);

      for (let i = 1; i < pathPoints.length; i++) {
        ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
      }
      ctx.stroke();
    }

    function calibrateNeutral() {
      neutralRoll = currentRoll;
      statusEl.textContent = `Status: calibrated | Neutral roll ${neutralRoll.toFixed(1)}`;
      updateDotPosition();
    }

    function startRound() {
      roundNumber += 1;
      roundStartTime = performance.now();
      pathPoints = [];
      ctx.clearRect(0, 0, 400, 400);

      roundStats = {
        round: roundNumber,
        spacing: currentSpacing,
        touchesLeft: 0,
        touchesRight: 0,
        successfulTransitions: 0,
        transitionTimes: [],
        lastHitTime: null,
        lastHitSide: null,
        comfortableResponse: null,
        maxLeftDrift: 0,
        maxRightDrift: 0,
        timeInCenterZoneMs: 0,
        lastFrameTime: performance.now()
      };

      setTargets(currentSpacing);
      activateTarget("right");
      phase = "running";
      comfortControls.style.display = "none";

      roundInfoEl.textContent = `Round: ${roundNumber}`;
      timerInfoEl.textContent = `Time: 10.0 sec`;
      statusEl.textContent = `Status: Round ${roundNumber} - move to RIGHT target`;
    }

    function startTest() {
      reportEl.style.display = "none";
      reportEl.textContent = "";
      allRounds = [];
      roundNumber = 0;
      currentSpacing = 14;
      phase = "idle";
      startRound();
    }

    function hitTarget(side) {
      const now = performance.now();

      if (side === "left") {
        roundStats.touchesLeft += 1;
      } else {
        roundStats.touchesRight += 1;
      }

      if (roundStats.lastHitSide && roundStats.lastHitSide !== side && roundStats.lastHitTime) {
        roundStats.successfulTransitions += 1;
        roundStats.transitionTimes.push((now - roundStats.lastHitTime) / 1000);
      }

      roundStats.lastHitSide = side;
      roundStats.lastHitTime = now;

      if (side === "left") {
        activateTarget("right");
        statusEl.textContent = `Status: Good - now move to RIGHT`;
      } else {
        activateTarget("left");
        statusEl.textContent = `Status: Good - now move to LEFT`;
      }
    }

    function endRoundAndAskComfort() {
      phase = "pausedForComfort";
      comfortControls.style.display = "block";
      leftTargetEl.classList.remove("active");
      rightTargetEl.classList.remove("active");

      statusEl.textContent = `Status: Round ${roundNumber} complete. Was that sway comfortable?`;

      allRounds.push({ ...roundStats });
    }

    function processComfortResponse(response) {
      if (!allRounds.length) return;

      allRounds[allRounds.length - 1].comfortableResponse = response;

      if (response === "comfortable") {
        currentSpacing += spacingStep;
      } else if (response === "tooMuch") {
        currentSpacing = Math.max(minSpacing, currentSpacing - 2);
      }

      if (roundNumber >= maxRounds || response === "tooMuch") {
        finishTest();
        return;
      }

      startRound();
    }

    function finishTest() {
      phase = "done";
      comfortControls.style.display = "none";
      leftTargetEl.classList.remove("active");
      rightTargetEl.classList.remove("active");
      statusEl.textContent = "Status: test complete";
      timerInfoEl.textContent = "Time: done";
      generateReport();
    }

    function average(nums) {
      if (!nums.length) return 0;
      return nums.reduce((a, b) => a + b, 0) / nums.length;
    }

    function generateReport() {
      if (!allRounds.length && roundStats && roundNumber > 0) {
        allRounds.push({ ...roundStats, comfortableResponse: "not recorded" });
      }

      const roundsCompleted = allRounds.length;
      const allTransitions = allRounds.flatMap(r => r.transitionTimes || []);
      const avgTransition = average(allTransitions);

      let totalTouches = 0;
      let totalTransitions = 0;
      let highestComfortableLevel = 0;
      let recommendedLevel = 1;
      let maxLeftDrift = 0;
      let maxRightDrift = 0;
      let comfortSummary = [];

      allRounds.forEach((r, i) => {
        totalTouches += (r.touchesLeft + r.touchesRight);
        totalTransitions += r.successfulTransitions;
        maxLeftDrift = Math.max(maxLeftDrift, r.maxLeftDrift || 0);
        maxRightDrift = Math.max(maxRightDrift, r.maxRightDrift || 0);

        if (r.comfortableResponse === "comfortable") {
          highestComfortableLevel = i + 1;
          recommendedLevel = i + 1;
        }

        comfortSummary.push(
          `Round ${r.round}: spacing ${r.spacing}px | transitions ${r.successfulTransitions} | response: ${r.comfortableResponse || "not recorded"}`
        );
      });

      if (highestComfortableLevel === 0 && roundsCompleted > 0) {
        recommendedLevel = 1;
      }

      let controlQuality = "Good";
      if (avgTransition === 0 || totalTransitions < 4) controlQuality = "Limited";
      else if (avgTransition > 1.6) controlQuality = "Fair";
      else if (avgTransition > 1.1) controlQuality = "Good";
      else controlQuality = "Very good";

      let score = 50;

      score += Math.min(20, totalTransitions * 2);
      if (avgTransition > 0) {
        score += Math.max(0, Math.min(20, 20 - ((avgTransition - 0.8) * 12)));
      }
      score += Math.min(10, highestComfortableLevel * 2);
      score = Math.max(0, Math.min(100, Math.round(score)));

      let interpretation = "Mild ankle sway control deficit";
      if (score >= 85) interpretation = "Good ankle strategy control";
      else if (score >= 70) interpretation = "Mild balance challenge";
      else if (score >= 55) interpretation = "Moderate balance challenge";
      else interpretation = "Marked balance challenge / train at low level";

      const reportText = `
ANVA SWAY STEPS REPORT
Test: Tiny Left-Right Ankle Sway

Rounds Completed: ${roundsCompleted}
Total Target Touches: ${totalTouches}
Total Successful Left-Right Transitions: ${totalTransitions}
Average Transition Time: ${avgTransition ? avgTransition.toFixed(2) : "-"} sec

Highest Comfortable Level: ${highestComfortableLevel || 0}
Recommended Training Level: ${recommendedLevel}

Maximum Left Drift: ${maxLeftDrift.toFixed(1)} px
Maximum Right Drift: ${maxRightDrift.toFixed(1)} px

Control Quality: ${controlQuality}
Overall Score: ${score}/100
Interpretation: ${interpretation}

Round-by-Round Summary
${comfortSummary.join("\n")}

Clinical Notes
- This test reflects very small lateral sway tolerance around neutral.
- Higher comfortable levels suggest better ankle-strategy control.
- Slower transition times may reflect reduced confidence or delayed weight shift.
- If the patient reports “too much” early, begin training at a smaller spacing.
      `.trim();

      reportEl.textContent = reportText;
      reportEl.style.display = "block";
    }

    function updateMetricsPerFrame() {
      if (phase !== "running" || !roundStats) return;

      const now = performance.now();
      const dt = now - roundStats.lastFrameTime;
      roundStats.lastFrameTime = now;

      const leftDrift = Math.max(0, centerX - (dotX + 9));
      const rightDrift = Math.max(0, (dotX + 9) - centerX);

      roundStats.maxLeftDrift = Math.max(roundStats.maxLeftDrift, leftDrift);
      roundStats.maxRightDrift = Math.max(roundStats.maxRightDrift, rightDrift);

      const centerDist = Math.abs((dotX + 9) - centerX);
      if (centerDist <= 12) {
        roundStats.timeInCenterZoneMs += dt;
      }
    }

    function updateGameLogic() {
      if (phase !== "running") return;

      const now = performance.now();
      const elapsed = now - roundStartTime;
      const remaining = Math.max(0, (roundDurationMs - elapsed) / 1000);
      timerInfoEl.textContent = `Time: ${remaining.toFixed(1)} sec`;

      updateMetricsPerFrame();

      const leftTargetX = centerX - currentSpacing;
      const rightTargetX = centerX + currentSpacing;
      const currentDotCenterX = dotX + 9;
      const currentDotCenterY = dotY + 9;

      const leftDist = distance(currentDotCenterX, currentDotCenterY, leftTargetX, centerY);
      const rightDist = distance(currentDotCenterX, currentDotCenterY, rightTargetX, centerY);

      if (activeTarget === "left" && leftDist <= targetTolerance) {
        hitTarget("left");
      } else if (activeTarget === "right" && rightDist <= targetTolerance) {
        hitTarget("right");
      }

      if (elapsed >= roundDurationMs) {
        endRoundAndAskComfort();
      }
    }

    function loop() {
      updateDotPosition();
      addPathPoint();
      drawPath();
      updateGameLogic();
      requestAnimationFrame(loop);
    }

    function handleOrientation(event) {
      if (typeof event.gamma === "number") currentRoll = event.gamma;
    }

    motionBtn.addEventListener("click", async () => {
      try {
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const response = await DeviceOrientationEvent.requestPermission();
          if (response === "granted") {
            window.addEventListener("deviceorientation", handleOrientation);
            statusEl.textContent = "Status: motion enabled";
          } else {
            statusEl.textContent = "Status: motion permission denied";
          }
        } else {
          window.addEventListener("deviceorientation", handleOrientation);
          statusEl.textContent = "Status: motion enabled";
        }
      } catch (err) {
        statusEl.textContent = "Status: motion error";
        console.error(err);
      }
    });

    calibrateBtn.addEventListener("click", calibrateNeutral);
    startBtn.addEventListener("click", startTest);
    finishBtn.addEventListener("click", finishTest);

    resetBtn.addEventListener("click", () => {
      phase = "idle";
      roundNumber = 0;
      currentSpacing = 14;
      allRounds = [];
      roundStats = null;
      pathPoints = [];
      ctx.clearRect(0, 0, 400, 400);
      comfortControls.style.display = "none";
      leftTargetEl.classList.remove("active");
      rightTargetEl.classList.remove("active");
      setTargets(currentSpacing);
      dotX = centerX;
      dotY = centerY;
      dot.style.left = "191px";
      dot.style.top = "191px";
      reportEl.style.display = "none";
      reportEl.textContent = "";
      roundInfoEl.textContent = "Round: -";
      timerInfoEl.textContent = "Time: -";
      statusEl.textContent = "Status: reset";
    });

    comfortableBtn.addEventListener("click", () => processComfortResponse("comfortable"));
    sameBtn.addEventListener("click", () => processComfortResponse("same"));
    tooMuchBtn.addEventListener("click", () => processComfortResponse("tooMuch"));

    setTargets(currentSpacing);
    loop();
  </script>
</body>
</html>
